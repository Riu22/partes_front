name: gestion_partes
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  flutter_dotenv: ^5.1.0 
  package_info_plus: ^8.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Paquete para generar los iconos automáticamente
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # Asegúrate de declarar la carpeta de assets para que Flutter encuentre el logo
  assets:
    - assets/LUM_LOGO.png
    - .env

# Configuración de iconos por plataforma
flutter_launcher_icons:
  image_path: "assets/LUM_LOGO.png"
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/LUM_LOGO.png"
  windows:
    generate: true
    image_path: "assets/LUM_LOGO.png"
    icon_size: 48 # Tamaño estándar para iconos de Windows