name: gestion_partes
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.15+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  dio: ^5.4.3
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1
  package_info_plus: ^10.1.0
  signature: ^6.3.0
  path_provider: ^2.1.0
  share_plus: ^13.1.0
  pdf: ^3.11.0
  printing: ^5.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Paquete para generar los iconos automáticamente
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # Asegúrate de declarar la carpeta de assets para que Flutter encuentre el logo
  assets:
    - assets/LUM_LOGO.png
    - .env

# Configuración de iconos por plataforma
flutter_launcher_icons:
  image_path: "assets/LUM_LOGO.png"
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/LUM_LOGO.png"
  windows:
    generate: true
    image_path: "assets/LUM_LOGO.png"
    icon_size: 48 # Tamaño estándar para iconos de Windows