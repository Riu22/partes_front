<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gestión de Partes - Aplicación para registro y administración de partes de trabajo">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gestión Partes">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gestión de Partes</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #E8EAF0;
    }

    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #E8EAF0;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E0E3EA;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #splash p {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #888888;
    }

    #lcp-marker {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      pointer-events: none;
      color: transparent;
    }
  </style>
</head>
<body>
  <div id="lcp-marker">Gestión de Partes</div>

  <div id="splash">
    <div class="spinner"></div>
    <p>Cargando Gestión de Partes…</p>
  </div>

  <script>
    window.hideSplash = function () {
      var el = document.getElementById('splash');
      if (el) el.classList.add('hidden');
    };

    // --- SCRIPT ANTI-CACHÉ AGRESIVO PARA PWA (FLUTTER 3.22+) ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        // Si el Service Worker que controla la página cambia (se instala uno nuevo)
        // forzamos la recarga inmediata para aplicar los cambios del Docker.
        console.log("Detectado nuevo Service Worker. Recargando aplicación...");
        window.location.reload();
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
