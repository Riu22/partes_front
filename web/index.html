<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gestión de Partes - Aplicación para registro y administración de partes de trabajo">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gestión Partes">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Preconnect a orígenes críticos -->
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gestión de Partes</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #E8EAF0;
    }

    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #E8EAF0;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E0E3EA;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #splash p {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #888888;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="spinner"></div>
    <p>Cargando Gestión de Partes…</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('load', function () {
      // Ocultar splash cuando Flutter ya haya renderizado
      if (typeof flutterInitialized !== 'undefined' && flutterInitialized) {
        document.getElementById('splash').classList.add('hidden');
      }
    });

    // Si Flutter expone un callback, usarlo para ocultar el splash
    if (window._flutter) {
      const orig = window._flutter.loader.load;
      window._flutter.loader.load = function () {
        const result = orig.apply(this, arguments);
        document.getElementById('splash').classList.add('hidden');
        return result;
      };
    }
  </script>
</body>
</html>
